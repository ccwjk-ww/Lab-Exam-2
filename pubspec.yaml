name: ai_expense_tracker
description: AI Receipt & Expense Tracker - Enterprise Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Architecture & DI
  get_it: ^7.6.7
  dartz: ^0.10.1

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  auto_route: ^9.2.2

  # Networking
  dio: ^5.4.3
  json_annotation: ^4.9.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Key-Value Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON Serialization
  freezed_annotation: ^2.4.1

  # ML Kit
  google_mlkit_text_recognition: ^0.13.1
  image_picker: ^1.1.2

  # UI
  fl_chart: ^0.68.0
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.9
  auto_route_generator: ^9.2.1
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  drift_dev: ^2.18.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
